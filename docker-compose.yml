# profanity-hush — docker-compose convenience wrapper
# =======================================================================
# Intended for workstation use (Manjaro/Arch). For both machines,
# hush.sh is the primary interface; compose is here for `build` and
# for quick one-off runs without typing full docker flags.
#
# ── Setup (first time) ──────────────────────────────────────────────────
#   cp .env.example .env        # copy, then edit paths
#   docker compose build        # build the profanity-hush image
#
# ── Running a job ───────────────────────────────────────────────────────
#   # Fastest: let hush.sh handle path resolution
#   ./hush.sh movie.mkv
#
#   # Via compose (set INPUT_DIR in .env or inline):
#   INPUT_DIR=/media/movies docker compose run --rm hush /input/movie.mkv
#
#   # Interactive review:
#   INPUT_DIR=/media/movies docker compose run --rm hush \
#       /input/movie.mkv --interactive
#
# ── Volume variables (set in .env or environment) ───────────────────────
#   INPUT_DIR   : directory containing the source video          [required]
#   OUTPUT_DIR  : destination for censored output                [default: INPUT_DIR]
#   CONFIG_DIR  : directory with config.yaml and word_list.txt   [default: ./config]
#   CACHE_DIR   : model weight cache; persist this!              [default: see below]
#   JOBS_DIR    : job history and intermediate files             [default: see below]
# =======================================================================

services:
  hush:
    image: profanity-hush
    build:
      context: .
      dockerfile: Dockerfile
    # Run as the invoking host user, not root — otherwise every file written
    # into the bind-mounted volumes below ends up root-owned on the host.
    # docker-compose can't shell out to `id -u` inline like hush.sh does, so
    # this relies on HOST_UID/HOST_GID being set — NOT plain UID/GID, since
    # UID is a readonly builtin in bash and `export UID=...` fails outright.
    # Set them in .env (compose parses .env directly, bypassing the shell,
    # so the bash-readonly issue doesn't apply there):
    #   echo "HOST_UID=$(id -u)" >> .env
    #   echo "HOST_GID=$(id -g)" >> .env
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      # Source video directory — read-only inside the container
      - ${INPUT_DIR:?INPUT_DIR must be set to the directory containing your video}:/input:ro
      # Censored output destination (defaults to the same directory as input)
      - ${OUTPUT_DIR:-${INPUT_DIR}}:/output
      # Pipeline config: config.yaml and word_list.txt
      - ${CONFIG_DIR:-./config}:/config:ro
      # Model weight cache — ALWAYS persist this between runs.
      # Demucs htdemucs_ft + WhisperX large-v2 total ~2-3 GB on first run.
      - ${CACHE_DIR:-${HOME}/.cache/profanity-hush}:/cache
      # Job history: transcript JSON, censor log, resume artifacts
      - ${JOBS_DIR:-${HOME}/.local/share/profanity-hush/jobs}:/jobs

    environment:
      # Log verbosity: debug | info | warning
      AC_LOG_LEVEL: ${AC_LOG_LEVEL:-info}
      # Set to 1 to retain large intermediate WAV stems after the run
      AC_KEEP_INTERMEDIATES: ${AC_KEEP_INTERMEDIATES:-0}
      # Set to 0 to also delete dialog.wav/score_sfx.wav (kept by default --
      # see output.keep_correction_artifacts in config.yaml); leave unset to
      # keep the default of true.
      AC_KEEP_CORRECTION_ARTIFACTS: ${AC_KEEP_CORRECTION_ARTIFACTS:-}
      # Set to 1 to enable interactive review (same as --interactive flag)
      AC_INTERACTIVE: ${AC_INTERACTIVE:-0}
      # Override audio.segment_size_sec (seconds); 0 = no segmentation
      AC_SEGMENT_SIZE: ${AC_SEGMENT_SIZE:-}
      # Host UTC offset for human-readable log timestamps, e.g. "-0700"
      # (run `date +%z` to get yours). hush.sh detects this automatically;
      # compose can't shell out the same way, so set it yourself in .env if
      # you want local time in logs -- otherwise timestamps default to
      # clearly-labelled UTC, not silently-wrong-looking local time.
      AC_TZ_OFFSET: ${AC_TZ_OFFSET:-}
      # Optional cosmetic abbreviation alongside the offset, e.g. "PDT"
      # (run `date +%Z` to get yours). Has no effect without AC_TZ_OFFSET.
      AC_TZ_NAME: ${AC_TZ_NAME:-}

    # stdin_open + tty are required for interactive review mode (Step 4b).
    # They are harmless in unattended mode — a TTY is simply never used.
    stdin_open: true
    tty: true

    # Default command — override on the CLI:
    #   docker compose run --rm hush /input/movie.mkv [/input/movie.srt] [--interactive]
    # There is no meaningful default here; the video filename is required.
    # Compose will start the container and show the usage message if omitted.
